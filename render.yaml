services:
  - type: web
    name: Meghshree-MeetPro
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PORT
        value: 10000
    plan: free
