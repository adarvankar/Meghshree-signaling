<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MeetPro — Offline</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f7ef7">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0f1117;color:#e8eaf0;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:24px}
.card{
  background:#1a1d27;border:1px solid #2d3045;border-radius:20px;
  padding:48px 36px;max-width:380px;width:100%}
.icon{font-size:64px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;margin-bottom:8px}
p{color:#8892a4;font-size:14px;line-height:1.6;margin-bottom:24px}
.btn{
  display:inline-block;padding:12px 28px;border-radius:10px;
  background:linear-gradient(135deg,#4f7ef7,#6c5ce7);color:#fff;
  font-size:14px;font-weight:600;text-decoration:none;border:none;cursor:pointer;
  transition:opacity .2s}
.btn:hover{opacity:.85}
.tips{margin-top:24px;text-align:left;background:#222535;border-radius:10px;padding:14px 16px}
.tips h3{font-size:12px;font-weight:600;color:#8892a4;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.tips li{font-size:13px;color:#8892a4;margin-bottom:6px;padding-left:4px;list-style:none}
.tips li::before{content:"→ ";color:#4f7ef7}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>MeetPro needs an internet connection for video meetings. Please check your connection and try again.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <div class="tips">
    <h3>While you wait</h3>
    <ul>
      <li>Check your WiFi or mobile data</li>
      <li>Try turning airplane mode off and on</li>
      <li>Move closer to your router</li>
      <li>Once connected, tap "Try Again"</li>
    </ul>
  </div>
</div>
<script>
  // Auto-reload when connection returns
  window.addEventListener('online', () => window.location.reload());
</script>
</body>
</html>
